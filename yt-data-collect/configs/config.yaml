pipeline:
  query: "python tutorial"
  limit: 5
  base_output_dir: "outputs"

search:
  upload_days: 365
  max_limit: 50
  sort_by: "view_count"

subtitles:
  languages:
    - "en"

  # Step 1:
  # Keep this low.
  # 1 is safest because transcript requests happen one by one.
  max_workers: 1

  # Step 2:
  # Delay before each transcript request.
  # Increase this if YouTube still blocks requests.
  request_delay_seconds: 8

  # Step 3:
  # Retry failed transcript requests slowly.
  retry_count: 3
  retry_backoff_seconds: 10

logging:
  level: "INFO"